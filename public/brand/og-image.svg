  <text x="1100" y="556" text-anchor="end" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.5" fill="#F0ECE4">Sprint<tspan fill="#FF5E00">Labs.</tspan></text>
