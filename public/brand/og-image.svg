  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <g transform="translate(100,100)">
    <rect x="2" y="2" width="92" height="92" rx="20" fill="#0F0F0F" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>
    <path d="M32 30 L51 48 L32 66" fill="none" stroke="#FF5E00" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
